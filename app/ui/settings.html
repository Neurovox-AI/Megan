<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>Einstellungen</title><link rel="stylesheet" href="style.css"><style>
body{overflow-y:auto;}.window{min-height:100vh;display:flex;flex-direction:column;}
.content{flex:1;padding:18px 24px 28px;display:flex;flex-direction:column;gap:18px;}
.sec-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-3);margin-bottom:7px;}
.sc{background:rgba(255,255,255,0.6);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.7);border-radius:14px;overflow:hidden;}
.sr{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid rgba(160,100,60,0.07);}
.sr:last-child{border-bottom:none;}
.rl{font-size:14px;font-weight:500;color:var(--text);}.rs{font-size:11px;color:var(--text-3);margin-top:1px;}
.ii{width:150px;padding:7px 11px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.8);font-size:13px;color:var(--text);outline:none;}
.ii:focus{border-color:rgba(232,69,106,0.35);box-shadow:0 0 0 3px rgba(232,69,106,0.08);}
.toggle{position:relative;width:42px;height:24px;cursor:pointer;}
.toggle input{display:none;}
.tt{position:absolute;inset:0;border-radius:12px;background:var(--bg-3);transition:background 0.2s;}
.toggle input:checked+.tt{background:var(--rose);}
.th{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:white;box-shadow:0 2px 6px rgba(0,0,0,0.15);transition:transform 0.2s cubic-bezier(.23,1,.32,1);}
.toggle input:checked~.th{transform:translateX(18px);}
.kw{display:flex;gap:6px;align-items:center;width:100%;}
.kw .ii{flex:1;width:auto;}
.sb{padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.7);color:var(--text-2);font-size:11px;cursor:pointer;transition:all 150ms ease;}
.sb:hover{background:rgba(255,255,255,0.95);color:var(--text);}
.save-row{display:flex;gap:10px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);padding:10px 20px;border-radius:10px;background:rgba(28,20,16,0.88);color:white;font-size:13px;font-weight:600;backdrop-filter:blur(16px);transition:transform 0.3s cubic-bezier(.23,1,.32,1),opacity 0.3s ease;opacity:0;z-index:1000;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style></head><body class="noise"><div class="window">
<div class="titlebar"><div class="titlebar-logo">
<svg width="18" height="18" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="21" fill="url(#g4)"/><polyline points="3,22 9,22 13,12 17,32 21,17 25,27 29,22 41,22" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><defs><linearGradient id="g4" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#F0506E"/><stop offset="1" stop-color="#F472B6"/></linearGradient></defs></svg>
<span style="font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:var(--text)">Einstellungen</span>
</div></div>
<div class="content">
<div class="fade-up"><div class="sec-hdr">Assistent</div><div class="sc">
<div class="sr"><div><div class="rl">Name</div><div class="rs">Wie der Assistent heißt</div></div><input class="ii" type="text" id="an" value="Megan"></div>
<div class="sr"><div><div class="rl">Shortcut</div></div><input class="ii" type="text" id="sc2" value="⌘⇧M" readonly style="color:var(--text-2);cursor:default"></div>
<div class="sr"><div><div class="rl">Autostart</div><div class="rs">Bei Anmeldung starten</div></div><label class="toggle"><input type="checkbox" id="as" checked><div class="tt"></div><div class="th"></div></label></div>
</div></div>
<div class="fade-up delay-1"><div class="sec-hdr">Stimme</div><div class="sc">
<div class="sr"><div><div class="rl">ElevenLabs Voice ID</div><div class="rs">Jessica: cgSgspJ2msm6clMCkdW9</div></div><input class="ii" type="text" id="vi" value="cgSgspJ2msm6clMCkdW9"></div>
</div></div>
<div class="fade-up delay-2" id="devs"><div class="sec-hdr">Developer API Keys</div><div class="sc">
<div class="sr" style="flex-direction:column;align-items:flex-start;gap:8px"><div class="rl">Anthropic API Key</div><div class="kw"><input class="ii" type="password" id="ak" placeholder="sk-ant-api03-..."><button class="sb" onclick="toggleKey('ak',this)">Zeigen</button></div></div>
<div class="sr" style="flex-direction:column;align-items:flex-start;gap:8px"><div class="rl">ElevenLabs API Key</div><div class="kw"><input class="ii" type="password" id="ek" placeholder="sk_..."><button class="sb" onclick="toggleKey('ek',this)">Zeigen</button></div></div>
</div></div>
<div class="fade-up delay-3"><div class="sec-hdr">Plan</div><div class="sc">
<div class="sr"><div class="rl">Aktueller Plan</div><span id="pd" class="plan-badge">Free</span></div>
<div class="sr" style="justify-content:center"><button class="btn-rose" style="padding:10px 20px;font-size:13px" onclick="document.title='__OPEN_UPGRADE__'">Plan upgraden ↑</button></div>
</div></div>
<div class="save-row fade-up delay-4">
<button class="btn-rose" onclick="saveAll()" style="flex:1;justify-content:center">Speichern</button>
<button class="btn-glass" onclick="window.history.back()" style="padding:12px 16px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
</div>
</div></div>
<div class="toast" id="toast"></div>
<script>
function toggleKey(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.textContent=i.type==='password'?'Zeigen':'Verbergen';}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
async function loadConfig(){
  try{const c=await window.pywebview.api.get_config();
  document.getElementById('an').value=c.assistant_name||'Megan';
  document.getElementById('as').checked=c.autostart!==false;
  document.getElementById('vi').value=c.elevenlabs_voice_id||'';
  document.getElementById('pd').textContent=(c.plan||'free').charAt(0).toUpperCase()+(c.plan||'free').slice(1);
  document.getElementById('devs').style.display=c.plan==='developer'?'block':'none';
  }catch(e){}
}
async function saveAll(){
  const d={assistant_name:document.getElementById('an').value.trim(),autostart:document.getElementById('as').checked,elevenlabs_voice_id:document.getElementById('vi').value.trim()};
  const ak=document.getElementById('ak').value.trim(),ek=document.getElementById('ek').value.trim();
  if(ak)d.anthropic_key=ak;if(ek)d.elevenlabs_key=ek;
  try{const r=await window.pywebview.api.save_settings(d);if(r.ok)showToast('Gespeichert ✓');else showToast('Fehler: '+r.error);}catch(e){showToast('Gespeichert ✓');}
}
window.addEventListener('load',()=>setTimeout(loadConfig,200));
</script></body></html>
