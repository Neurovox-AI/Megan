<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><title>VoiceImpulse</title><link rel="stylesheet" href="style.css"><style>
body{overflow:hidden;}.window{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}
.content{flex:1;padding:18px 20px 20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;position:relative;z-index:1;}
.status-card{padding:18px;display:flex;align-items:center;gap:14px;transition:all 0.3s ease;}
.status-orb{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.4s ease;}
.orb-idle{background:rgba(232,69,106,0.08);border:1px solid rgba(232,69,106,0.25);}
.orb-listening{background:rgba(232,69,106,0.15);border:1px solid rgba(232,69,106,0.5);animation:orb-pulse 1.5s ease infinite;}
.orb-thinking{background:linear-gradient(145deg,#E8456A,#F472B6);box-shadow:0 8px 24px rgba(232,69,106,0.4);}
@keyframes orb-pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,69,106,0.35);}50%{box-shadow:0 0 0 10px rgba(232,69,106,0);}}
.status-main{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;}
.status-sub{font-size:12px;color:var(--text-2);}
.wave-bars{display:none;align-items:center;gap:3px;height:18px;}.wave-bars.visible{display:flex;}
.trigger-btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(160deg,#F0506E 0%,#E8456A 40%,#D63460 100%);color:white;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 0 0 1px rgba(255,255,255,0.12) inset,0 12px 32px rgba(232,69,106,0.4);transition:all 160ms cubic-bezier(.23,1,.32,1);position:relative;overflow:hidden;}
.trigger-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:45%;background:linear-gradient(to bottom,rgba(255,255,255,0.18),transparent);}
.trigger-btn:hover{transform:translateY(-2px);box-shadow:0 0 0 1px rgba(255,255,255,0.15) inset,0 20px 44px rgba(232,69,106,0.5);}
.trigger-btn:active{transform:translateY(1px) scale(0.99);}
.trigger-btn:disabled{opacity:0.45;cursor:not-allowed;transform:none;}
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{padding:13px 15px;border-radius:14px;border:1px solid rgba(245,237,226,0.08);background:rgba(255,255,255,0.04);backdrop-filter:blur(16px);}
.stat-value{font-family:'Fraunces',serif;font-size:22px;font-weight:600;margin-bottom:2px;}
.stat-label{font-size:11px;color:var(--text-3);}
.usage-section{display:flex;flex-direction:column;gap:7px;}
.usage-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-3);}
.usage-bar-bg{height:4px;border-radius:2px;background:rgba(245,237,226,0.06);overflow:hidden;}
.usage-bar-fill{height:100%;border-radius:2px;background:linear-gradient(to right,#E8456A,#F472B6);transition:width 0.6s ease;}
.bottom-nav{display:flex;gap:8px;}
.nav-btn{flex:1;padding:9px;border-radius:12px;border:1px solid rgba(245,237,226,0.08);background:rgba(255,255,255,0.04);color:var(--text-2);font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 160ms ease;}
.nav-btn:hover{background:rgba(255,255,255,0.08);color:var(--text);border-color:rgba(245,237,226,0.14);}
</style></head><body class="noise"><div class="window">

<div class="titlebar">
  <div class="titlebar-logo">
    <svg width="18" height="18" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="21" fill="url(#g3)"/><polyline points="3,22 9,22 13,12 17,32 21,17 25,27 29,22 41,22" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><defs><linearGradient id="g3" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse"><stop stop-color="#F0506E"/><stop offset="1" stop-color="#F472B6"/></linearGradient></defs></svg>
    <span style="font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:var(--text)">VoiceImpulse</span>
  </div>
  <div style="display:flex;align-items:center;gap:6px"><div class="pulse-dot" id="sd"></div><span id="pb" class="plan-badge">Free</span></div>
</div>

<div class="content">
  <div class="glass-deep status-card fade-up" id="sc">
    <div class="status-orb orb-idle" id="so">
      <svg id="ii" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8456A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      <svg id="it" style="display:none" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </div>
    <div>
      <div class="status-main" id="sm">Bereit</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="wave-bars" id="wb">
          <div class="wave-bar" style="height:16px;animation-delay:0s"></div>
          <div class="wave-bar" style="height:16px;animation-delay:0.15s"></div>
          <div class="wave-bar" style="height:16px;animation-delay:0.3s"></div>
          <div class="wave-bar" style="height:16px;animation-delay:0.45s"></div>
          <div class="wave-bar" style="height:16px;animation-delay:0.6s"></div>
        </div>
        <div class="status-sub" id="ss">⌘⇧M drücken um Megan zu aktivieren</div>
      </div>
    </div>
  </div>

  <button class="trigger-btn fade-up delay-1" id="tb" onclick="triggerListen()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
    Megan aktivieren
  </button>

  <div class="stats-row fade-up delay-2">
    <div class="stat-card">
      <div class="stat-value gradient-text" id="su">0</div>
      <div class="stat-label">Anfragen diesen Monat</div>
    </div>
    <div class="stat-card">
      <div class="stat-value gradient-text" id="sl">10</div>
      <div class="stat-label">verfügbar</div>
    </div>
  </div>

  <div class="usage-section fade-up delay-3">
    <div class="usage-label"><span>Nutzung</span><span id="ut">0 / 10</span></div>
    <div class="usage-bar-bg"><div class="usage-bar-fill" id="uf" style="width:0%"></div></div>
  </div>

  <div class="bottom-nav fade-up delay-4">
    <button class="nav-btn" onclick="openSettings()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Einstellungen
    </button>
    <button class="nav-btn" onclick="document.title='__OPEN_UPGRADE__'" style="border-color:rgba(232,69,106,0.2);color:rgba(232,69,106,0.7);">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      Upgrade
    </button>
  </div>
</div>

</div>
<script>
function setStatus(s){
  const orb=document.getElementById('so'),sm=document.getElementById('sm'),ss=document.getElementById('ss'),wb=document.getElementById('wb'),tb=document.getElementById('tb'),ii=document.getElementById('ii'),it=document.getElementById('it');
  orb.className='status-orb';wb.classList.remove('visible');ii.style.display='block';it.style.display='none';
  if(s==='idle'||s==='ready'){orb.classList.add('orb-idle');sm.textContent='Bereit';ss.textContent='⌘⇧M drücken um Megan zu aktivieren';tb.disabled=false;}
  else if(s==='listening'){orb.classList.add('orb-listening');sm.textContent='Hört zu...';ss.textContent='Sprich jetzt';wb.classList.add('visible');tb.disabled=true;}
  else if(s==='thinking'||s==='speaking'){orb.classList.add('orb-thinking');ii.style.display='none';it.style.display='block';sm.textContent=s==='thinking'?'Denkt nach...':'Spricht...';ss.textContent='';tb.disabled=true;}
  else if(s==='loading'){orb.classList.add('orb-idle');sm.textContent='Lädt...';ss.textContent='Whisper wird initialisiert';tb.disabled=true;}
}
async function loadInfo(){
  try{
    const i=await window.pywebview.api.get_plan_info();
    document.getElementById('pb').textContent=i.plan.charAt(0).toUpperCase()+i.plan.slice(1);
    const lim=i.limit===-1?'∞':String(i.limit);
    document.getElementById('su').textContent=i.used;document.getElementById('sl').textContent=lim;
    const pct=i.limit===-1?5:Math.min(100,(i.used/i.limit)*100);
    document.getElementById('uf').style.width=pct+'%';document.getElementById('ut').textContent=i.used+' / '+lim;
    const st=await window.pywebview.api.get_status();setStatus(st.ready?'idle':'loading');
  }catch(e){}
}
async function triggerListen(){setStatus('listening');try{await window.pywebview.api.trigger_listen();}catch(e){setStatus('idle');}}
function openSettings(){document.title='__OPEN_SETTINGS__';}
window.updateStatus=setStatus;
window.addEventListener('load',()=>setTimeout(loadInfo,300));
</script></body></html>
