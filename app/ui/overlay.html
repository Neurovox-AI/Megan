<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>__MEGAN_OVERLAY__</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:260px; height:260px;
    background:transparent;
    overflow:hidden;
    -webkit-app-region:no-drag;
  }

  .scene {
    width:260px; height:260px;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-start;
    padding-top:24px;
    position:relative;
  }

  /* Maske die von unten aufsteigt */
  .mask {
    position:absolute; bottom:0; left:0; right:0;
    height:110px;
    background:linear-gradient(to top, rgba(8,4,4,0.95) 0%, rgba(8,4,4,0.7) 55%, transparent 100%);
    pointer-events:none;
    z-index:1;
  }

  /* Siri-artiger Ball */
  .orb-wrap {
    position:relative; z-index:2;
    width:140px; height:140px;
    display:flex; align-items:center; justify-content:center;
  }

  .orb-glow {
    position:absolute;
    width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle at 40% 40%, rgba(244,114,182,0.4), rgba(232,69,106,0.2), transparent 70%);
    filter:blur(18px);
    animation:glow-pulse 2.4s ease-in-out infinite;
  }

  .orb {
    width:110px; height:110px;
    border-radius:50%;
    background:radial-gradient(circle at 38% 32%,
      #f9a8d4 0%, #F472B6 25%, #E8456A 55%, #C41853 80%, #8B0D33 100%);
    filter:blur(1.5px);
    box-shadow:
      0 0 40px rgba(232,69,106,0.7),
      0 0 80px rgba(232,69,106,0.35),
      0 0 140px rgba(232,69,106,0.15),
      inset 0 8px 20px rgba(255,255,255,0.15);
    animation:morph 3.2s ease-in-out infinite, breathe 2.2s ease-in-out infinite;
    transform-origin:center;
    will-change:transform, border-radius, filter;
  }

  @keyframes morph {
    0%,100%{ border-radius:50%; }
    20%{ border-radius:62% 38% 56% 44% / 44% 58% 42% 56%; }
    40%{ border-radius:44% 56% 42% 58% / 58% 42% 60% 40%; }
    60%{ border-radius:56% 44% 60% 40% / 40% 62% 38% 58%; }
    80%{ border-radius:38% 62% 44% 56% / 56% 40% 60% 44%; }
  }
  @keyframes breathe {
    0%,100%{ transform:scale(1); filter:blur(1.5px); }
    50%{ transform:scale(1.08); filter:blur(2.5px); }
  }
  @keyframes glow-pulse {
    0%,100%{ opacity:0.6; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.15); }
  }

  /* Thinking state — langsameres Pulsieren */
  body.thinking .orb {
    animation:morph 4s ease-in-out infinite, breathe 3s ease-in-out infinite;
    filter:blur(3px) brightness(0.7);
  }
  /* Speaking state — schnell */
  body.speaking .orb {
    animation:morph 1.8s ease-in-out infinite, breathe 1.4s ease-in-out infinite;
  }
</style>
</head>
<body class="listening">
<div class="scene">
  <div class="orb-wrap">
    <div class="orb-glow" id="glow"></div>
    <div class="orb" id="orb"></div>
  </div>
  <div class="mask"></div>
</div>
<script>
const orb  = document.getElementById('orb');
const glow = document.getElementById('glow');

let currentScale = 1;
let targetScale  = 1;
let glowScale    = 1;

// Audio-Level vom Mikrofon → Ball reagiert
window.setAudioLevel = function(level) {
  // level: 0.0–1.0
  targetScale = 1 + (level * 0.45);
};

window.setStatus = function(s) {
  document.body.className = s;
  if (s === 'thinking' || s === 'speaking') {
    targetScale = 1;
  }
};

// Sanfte Interpolation
(function animate() {
  currentScale += (targetScale - currentScale) * 0.18;
  targetScale  = Math.max(1, targetScale - 0.03);
  glowScale    = 1 + ((currentScale - 1) * 1.8);

  orb.style.transform  = `scale(${currentScale.toFixed(3)})`;
  glow.style.transform = `scale(${glowScale.toFixed(3)})`;
  glow.style.opacity   = (0.5 + (currentScale - 1) * 2).toFixed(3);

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
