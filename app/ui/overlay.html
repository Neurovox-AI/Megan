<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>__MEGAN_OVERLAY__</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:260px; height:260px;
    background:transparent;
    overflow:hidden;
    -webkit-app-region:no-drag;
  }

  .scene {
    width:260px; height:260px;
    display:flex;
    align-items:center; justify-content:center;
    position:relative;
  }

  /* Äußerer Ambient-Glow */
  .glow-ring {
    position:absolute;
    width:210px; height:210px; border-radius:50%;
    background:radial-gradient(circle, rgba(244,114,182,0.25) 0%, rgba(232,69,106,0.08) 55%, transparent 75%);
    filter:blur(22px);
    animation:glow-pulse 2.8s ease-in-out infinite;
  }

  /* Glaskugel */
  .orb {
    position:relative;
    width:176px; height:176px; border-radius:50%;
    overflow:hidden;

    /* Glasmaterial */
    background:radial-gradient(circle at 34% 28%,
      rgba(255,255,255,0.18) 0%,
      rgba(244,114,182,0.07) 35%,
      rgba(139,13,51,0.06)   65%,
      rgba(0,0,0,0.12)       100%);

    border:1.5px solid rgba(255,255,255,0.22);

    box-shadow:
      0 0 50px rgba(232,69,106,0.45),
      0 0 100px rgba(232,69,106,0.18),
      inset 0 2px 35px rgba(255,255,255,0.08),
      inset 0 -12px 28px rgba(196,24,83,0.12);

    -webkit-backdrop-filter:blur(6px);
    backdrop-filter:blur(6px);
  }

  canvas {
    position:absolute;
    top:0; left:0;
    width:176px; height:176px;
  }

  /* Glanzpunkt oben links */
  .orb::before {
    content:'';
    position:absolute;
    top:14px; left:20px;
    width:52px; height:28px;
    border-radius:50%;
    background:radial-gradient(ellipse, rgba(255,255,255,0.65) 0%, transparent 75%);
    transform:rotate(-25deg);
    filter:blur(3px);
    z-index:2;
    pointer-events:none;
  }

  /* Kleiner Reflex unten rechts */
  .orb::after {
    content:'';
    position:absolute;
    bottom:22px; right:24px;
    width:22px; height:14px;
    border-radius:50%;
    background:radial-gradient(ellipse, rgba(255,255,255,0.25) 0%, transparent 75%);
    filter:blur(2px);
    z-index:2;
    pointer-events:none;
  }

  @keyframes glow-pulse {
    0%,100%{ opacity:0.55; transform:scale(1); }
    50%{ opacity:1; transform:scale(1.13); }
  }
</style>
</head>
<body>
<div class="scene">
  <div class="glow-ring" id="glow"></div>
  <div class="orb">
    <canvas id="wave" width="176" height="176"></canvas>
  </div>
</div>
<script>
const canvas = document.getElementById('wave');
const ctx    = document.getElementById('wave').getContext('2d');
const glow   = document.getElementById('glow');
const W = 176, H = 176, CX = W/2, CY = H/2;

let audioLevel  = 0;
let targetLevel = 0;
let phase = [0, 0, 0];
let st = 'listening';

window.setAudioLevel = function(level) { targetLevel = level; };
window.setStatus = function(s) {
  st = s;
  if (s === 'speaking')  targetLevel = 0.42;
  if (s === 'thinking')  targetLevel = 0.12;
  if (s === 'listening') targetLevel = Math.max(targetLevel, 0);
};

const WAVES = [
  { freq:1.6, ampMult:1.00, width:2.8, alphaMax:0.92 },
  { freq:2.4, ampMult:0.60, width:2.0, alphaMax:0.50 },
  { freq:3.2, ampMult:0.36, width:1.4, alphaMax:0.30 },
];

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Smooth level
  audioLevel += (targetLevel - audioLevel) * 0.14;
  if (st === 'listening') targetLevel = Math.max(0.04, targetLevel - 0.022);

  // Phase speeds
  const spd = st === 'speaking' ? 0.065
            : st === 'thinking' ? 0.016
            : 0.030;
  phase[0] += spd;
  phase[1] += spd * 0.70;
  phase[2] += spd * 1.30;

  const baseAmp = 14 + audioLevel * 42;

  WAVES.forEach((w, i) => {
    const amp  = baseAmp * w.ampMult;
    const alf  = w.alphaMax * (0.55 + audioLevel * 0.45);

    // Gradient entlang der X-Achse
    const g = ctx.createLinearGradient(0, 0, W, 0);
    g.addColorStop(0,   `rgba(249,168,212,${(alf*0.25).toFixed(2)})`);
    g.addColorStop(0.25,`rgba(244,114,182,${alf.toFixed(2)})`);
    g.addColorStop(0.5, `rgba(232,69,106,${alf.toFixed(2)})`);
    g.addColorStop(0.75,`rgba(244,114,182,${alf.toFixed(2)})`);
    g.addColorStop(1,   `rgba(249,168,212,${(alf*0.25).toFixed(2)})`);

    // Wellenlinie
    ctx.beginPath();
    for (let x = 0; x <= W; x++) {
      const envelope = Math.sin((x / W) * Math.PI); // weiche Enden
      const y = CY + Math.sin((x / W) * Math.PI * 2 * w.freq + phase[i]) * amp * envelope;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = g;
    ctx.lineWidth   = w.width;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    ctx.stroke();

    // Füllung unter/über der Welle
    ctx.beginPath();
    ctx.moveTo(0, CY);
    for (let x = 0; x <= W; x++) {
      const envelope = Math.sin((x / W) * Math.PI);
      const y = CY + Math.sin((x / W) * Math.PI * 2 * w.freq + phase[i]) * amp * envelope;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, CY);
    ctx.closePath();
    const fg = ctx.createLinearGradient(0, CY - amp, 0, CY + amp);
    fg.addColorStop(0, `rgba(244,114,182,${(alf * 0.18).toFixed(2)})`);
    fg.addColorStop(1, `rgba(232,69,106,${(alf * 0.04).toFixed(2)})`);
    ctx.fillStyle = fg;
    ctx.fill();
  });

  // Outer glow reagiert auf Audio
  const gs = (1 + audioLevel * 0.28).toFixed(3);
  const go = (0.5 + audioLevel * 0.5).toFixed(3);
  glow.style.transform = `scale(${gs})`;
  glow.style.opacity   = go;

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
